name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt platformio

      - name: Build executable
        run: pyinstaller XploraVentures.spec

      - name: Build firmware
        run: pio run -e esp32-s3-devkitc-1

      - name: Verify build
        run: |
          if (!(Test-Path "dist\XploraVentures.exe")) {
            Write-Error "Build failed — dist\XploraVentures.exe not found"
            exit 1
          }
          if (!(Test-Path ".pio\build\esp32-s3-devkitc-1\firmware.bin")) {
            Write-Error "Firmware build failed — firmware.bin not found"
            exit 1
          }
          Write-Host "Dashboard OK: $((Get-Item dist\XploraVentures.exe).Length / 1MB) MB"
          Write-Host "Firmware OK: $((Get-Item .pio\build\esp32-s3-devkitc-1\firmware.bin).Length / 1KB) KB"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/XploraVentures.exe
            .pio/build/esp32-s3-devkitc-1/firmware.bin
          generate_release_notes: true
